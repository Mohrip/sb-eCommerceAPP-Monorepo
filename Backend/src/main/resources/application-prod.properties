# =============================================
# PRODUCTION PROFILE - application-prod.properties
# Activated by: SPRING_PROFILES_ACTIVE=prod
# =============================================

# Database - use env vars (never hardcode in prod)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA - NEVER use 'update' or 'create' in prod; use 'validate' or 'none'
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Security
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=86400000
spring.app.jwtCookieName=jwtCookieName

# AWS S3
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION}
aws.s3.bucket=${AWS_S3_BUCKET}

# Logging - no DEBUG in prod
logging.level.root=WARN
logging.level.com.StackShop.project=INFO
logging.level.com.StackShop.project.security=WARN

# Actuator - expose only health and info in prod (not everything!)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Server
server.port=5000

