spring.application.name=sb-ecom

# Active profile: override with SPRING_PROFILES_ACTIVE=prod in production
# spring.profiles.active=prod

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sb-ecom
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration (DEV defaults - overridden in application-prod.properties)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=86400000
spring.app.jwtCookieName=jwtCookieName

# AWS S3 Configuration
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION}
aws.s3.bucket=${AWS_S3_BUCKET}

# Debug logging for security (DEV only - overridden in application-prod.properties)
logging.level.com.StackShop.project.security=DEBUG

# Server port (Elastic Beanstalk expects 5000)
server.port=5000

# Actuator (DEV: expose all; PROD: restricted via application-prod.properties)
management.endpoints.web.exposure.include=*